<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ — Водить.РФ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wave"></div>
    <div class="header-bar">
        <h2><img src="images/boat.png" alt="Водить.РФ"> Админ</h2>
        <a href="#" onclick="logout()" class="btn btn-sm btn-outline"><span class="icon icon-gray">выход</span> Выйти</a>
    </div>

    <div class="card card-turquoise">
        <h3>Панель администратора</h3>
        <p class="text-light">Доступ: Admin26 · Просмотр и смена статусов заявок</p>

        <div class="stats">
            <div class="stat-box"><strong id="stat-total">0</strong><span>Всего</span></div>
            <div class="stat-box"><strong id="stat-new">0</strong><span>Новая</span></div>
            <div class="stat-box"><strong id="stat-progress">0</strong><span>Идёт обучение</span></div>
            <div class="stat-box"><strong id="stat-done">0</strong><span>Завершено</span></div>
        </div>

        <div class="field">
            <label>Поиск по заявкам</label>
            <div class="input-wrap">
                <span class="icon icon-blue">поиск</span>
                <input type="text" id="admin-search" placeholder="ID, имя, курс или отзыв...">
            </div>
        </div>

        <div class="admin-section">
            <label class="text-light">Фильтр:</label>
            <div class="chips" id="filter-chips"></div>
        </div>
        <div class="admin-section-lg">
            <label class="text-light">Сортировка:</label>
            <div class="chips" id="sort-chips"></div>
        </div>

        <div id="admin-list"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <div id="status-modal" class="modal" hidden>
        <div class="modal-backdrop"></div>
        <div class="modal-box">
            <h3>Смена статуса</h3>
            <p id="modal-app-info" class="modal-info"></p>
            <select id="modal-status" class="modal-select">
                <option value="Новая">Новая</option>
                <option value="Идет обучение">Идет обучение</option>
                <option value="Обучение завершено">Обучение завершено</option>
            </select>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-sm btn-outline">Отмена</button>
                <button id="modal-save" class="btn btn-sm btn-solid">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script>initAdmin();</script>
</body>
</html>
